<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humidity Forecast</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            margin: 0;
            padding: 16px;
            color: #E0E0E0;
        }
        h2 { margin-bottom: 4px; font-weight: 700; color: #FFFFFF; }
        .section-title { font-size: 1.1rem; margin-top: 24px; margin-bottom: 12px; color: #BB86FC; font-weight: 600; letter-spacing: 0.5px; }

        /* Current conditions: two cards side by side */
        .current-container {
            display: flex;
            gap: 10px;
        }
        .current-card {
            flex: 1;
            border-radius: 12px;
            padding: 14px 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .current-card .emoji { font-size: 2.2rem; line-height: 1; }
        .current-card .dp { font-size: 1.6rem; font-weight: 700; color: #FFFFFF; }
        .current-card .label { font-size: 0.9rem; font-weight: 600; color: #FFFFFF; }

        /* Hourly: single horizontal scroll, each column = one hour, two stacked cards */
        .hourly-container {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 12px;
        }
        .hourly-col {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
        }
        .hourly-col .time { font-weight: 600; font-size: 0.85rem; color: #FFFFFF; }
        .hourly-card {
            min-width: 80px;
            width: 80px;
            height: 84px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .hourly-card .emoji { font-size: 1.5rem; line-height: 1; }
        .hourly-card .dp { font-size: 0.95rem; font-weight: 700; color: #FFFFFF; }

        /* Daily: two columns side by side */
        .daily-container {
            display: flex;
            gap: 10px;
        }
        .daily-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
        }
        .daily-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 10px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .daily-row .day { font-weight: 700; width: 24px; color: #FFFFFF; font-size: 1rem; }
        .daily-row .emoji { font-size: 1.2rem; }
        .daily-row .dp { font-weight: 700; color: #FFFFFF; font-size: 1rem; }

        .loading { text-align: center; padding: 40px; font-size: 1.1rem; color: #A0A0A0; }
    </style>
</head>
<body>

    <h2>Humidity Dashboard</h2>
    <div id="app-content">
        <div class="loading">Loading forecast data...</div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const API_KEY = "dBDd2NsSmaumAn6u4QatKmfMljuQTyFJ"; // <-- Put your actual Tomorrow.io API Key here

        // Chicago first, Baldwinsville NY second. Order matters:
        // current = left/right, hourly = top/bottom, daily = left/right.
        const LOCATIONS = [
            { lat: 41.9742, lon: -87.6581 },  // Chicago
            { lat: 43.1283, lon: -76.3086 }   // Baldwinsville, NY
        ];

        const DOW2 = ['Su', 'M', 'T', 'W', 'H', 'F', 'Sa'];

        // Dark Primary Comfort Scale (0 to 5)
        function getComfort(dewPoint) {
            if (dewPoint >= 75) return { label: 'Oppressive', level: 5, emoji: '🔥', color: '#B71C1C' }; // Deep Dark Red
            if (dewPoint >= 70) return { label: 'Very Humid', level: 4, emoji: '🥵', color: '#E65100' }; // Deep Dark Orange
            if (dewPoint >= 65) return { label: 'Humid', level: 3, emoji: '💦', color: '#F57C00' };      // Dark Amber
            if (dewPoint >= 60) return { label: 'Sticky', level: 2, emoji: '💧', color: '#00695C' };     // Deep Teal
            if (dewPoint >= 55) return { label: 'Pleasant', level: 1, emoji: '✨', color: '#1B5E20' };   // Deep Dark Green
            return { label: 'Refreshing', level: 0, emoji: '🍃', color: '#0D47A1' };                    // Deep Primary Blue
        }

        function calculateDewPoint(tempF, humidityPct) {
            const tempC = (tempF - 32) * (5 / 9);
            const a = 17.27, b = 237.7;
            const alpha = ((a * tempC) / (b + tempC)) + Math.log(humidityPct / 100.0);
            const dpC = (b * alpha) / (a - alpha);
            return dpC * 9 / 5 + 32;
        }

        // Pull a dew point out of a values object, calculating it if the API
        // didn't provide one directly.
        function getDP(values, tempKey, humKey) {
            return values.dewPoint ?? values.dewPointAvg ??
                calculateDewPoint(values[tempKey], values[humKey]);
        }

        async function fetchCity(loc) {
            const response = await fetch(`https://api.tomorrow.io/v4/weather/forecast?location=${loc.lat},${loc.lon}&apikey=${API_KEY}&units=imperial`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
        }

        // "Now" = first minutely entry if present, otherwise first hourly entry.
        function getCurrentValues(data) {
            const min = data.timelines.minutely;
            if (min && min.length > 0) return min[0].values;
            return data.timelines.hourly[0].values;
        }

        async function fetchWeather() {
            try {
                const [chi, bvl] = await Promise.all(LOCATIONS.map(fetchCity));
                const cities = [chi, bvl];

                let html = '';

                // --- CURRENT CONDITIONS (Chicago left, Baldwinsville right) ---
                html += `<div class="section-title">Right Now</div><div class="current-container">`;
                cities.forEach(data => {
                    const v = getCurrentValues(data);
                    const dp = getDP(v, 'temperature', 'humidity');
                    const comfort = getComfort(dp);
                    html += `
                        <div class="current-card" style="background-color: ${comfort.color}">
                            <div class="emoji">${comfort.emoji}</div>
                            <div class="dp">${Math.round(dp)}°F</div>
                            <div class="label">${comfort.label} (${comfort.level})</div>
                        </div>`;
                });
                html += `</div>`;

                // --- HOURLY (one scroll strip; each column = one hour,
                //     Chicago card on top, Baldwinsville card below) ---
                const chiHours = chi.timelines.hourly.slice(0, 24);
                const bvlHours = bvl.timelines.hourly.slice(0, 24);
                const hourCount = Math.min(chiHours.length, bvlHours.length);

                html += `<div class="section-title">Next 24 Hours</div><div class="hourly-container">`;
                for (let i = 0; i < hourCount; i++) {
                    const timeLabel = new Date(chiHours[i].time).toLocaleTimeString([], { hour: 'numeric' }).replace(" ", "").toLowerCase();
                    html += `<div class="hourly-col"><div class="time">${timeLabel}</div>`;
                    [chiHours[i], bvlHours[i]].forEach(h => {
                        const dp = getDP(h.values, 'temperature', 'humidity');
                        const comfort = getComfort(dp);
                        html += `
                            <div class="hourly-card" style="background-color: ${comfort.color}">
                                <div class="emoji">${comfort.emoji}</div>
                                <div class="dp">${Math.round(dp)}°F</div>
                            </div>`;
                    });
                    html += `</div>`;
                }
                html += `</div>`;

                // --- DAILY (Chicago column left, Baldwinsville column right) ---
                html += `<div class="section-title">6-Day Forecast</div><div class="daily-container">`;
                cities.forEach(data => {
                    const dailyData = data.timelines.daily.slice(0, 6);
                    html += `<div class="daily-col">`;
                    dailyData.forEach(d => {
                        const dp = getDP(d.values, 'temperatureAvg', 'humidityAvg');
                        const comfort = getComfort(dp);
                        const dayLabel = DOW2[new Date(d.time).getDay()];
                        html += `
                            <div class="daily-row" style="background-color: ${comfort.color}">
                                <div class="day">${dayLabel}</div>
                                <div class="emoji">${comfort.emoji}</div>
                                <div class="dp">${Math.round(dp)}°F</div>
                            </div>`;
                    });
                    html += `</div>`;
                });
                html += `</div>`;

                document.getElementById('app-content').innerHTML = html;
            } catch (err) {
                document.getElementById('app-content').innerHTML = `<div class="loading" style="color:#CF6679;">Failed to fetch weather data. Check your API key.</div>`;
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        fetchWeather();
    </script>
</body>
</html>
