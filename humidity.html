<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Humidity Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            margin: 0;
            padding: 16px;
            color: #E0E0E0;
        }
        h2 { margin-bottom: 4px; font-weight: 700; color: #FFFFFF; }
        .section-title { font-size: 1.1rem; margin-top: 24px; margin-bottom: 12px; color: #BB86FC; font-weight: 600; letter-spacing: 0.5px; }

        /* Hourly horizontal scroll */
        .hourly-container {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 12px;
        }
        .hourly-card {
            min-width: 90px;
            height: 120px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .hourly-card .time { font-weight: 600; font-size: 0.85rem; color: #FFFFFF; }
        .hourly-card .emoji { font-size: 1.8rem; }
        .hourly-card .dp { font-size: 1rem; font-weight: 700; color: #FFFFFF; }

        /* Daily rows */
        .daily-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .daily-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .daily-row .day { font-weight: 700; width: 50px; color: #FFFFFF; font-size: 1.1rem; }
        .daily-row .comfort-status { display: flex; align-items: center; gap: 8px; font-weight: 600; color: #FFFFFF; }
        .daily-row .dp { font-weight: 700; color: #FFFFFF; font-size: 1.05rem; }

        .loading { text-align: center; padding: 40px; font-size: 1.1rem; color: #A0A0A0; }
    </style>
</head>
<body>

    <h2>Humidity Dashboard</h2>
    <div id="app-content">
        <div class="loading">Loading forecast data...</div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const API_KEY = "dBDd2NsSmaumAn6u4QatKmfMljuQTyFJ"; // <-- Put your actual Tomorrow.io API Key here
        const LAT = 41.9742;
        const LON = -87.6581;

        const DOW2 = ['Su', 'M', 'T', 'W', 'H', 'F', 'Sa'];

        // Dark Primary Comfort Scale (0 to 5)
        function getComfort(dewPoint) {
            if (dewPoint >= 75) return { label: 'Oppressive', level: 5, emoji: '🔥', color: '#B71C1C' }; // Deep Dark Red
            if (dewPoint >= 70) return { label: 'Very Humid', level: 4, emoji: '🥵', color: '#E65100' }; // Deep Dark Orange
            if (dewPoint >= 65) return { label: 'Humid', level: 3, emoji: '💦', color: '#F57C00' };      // Dark Amber
            if (dewPoint >= 60) return { label: 'Sticky', level: 2, emoji: '💧', color: '#00695C' };     // Deep Teal
            if (dewPoint >= 55) return { label: 'Pleasant', level: 1, emoji: '✨', color: '#1B5E20' };   // Deep Dark Green
            return { label: 'Refreshing', level: 0, emoji: '🍃', color: '#0D47A1' };                    // Deep Primary Blue
        }

        function calculateDewPoint(tempF, humidityPct) {
            const tempC = (tempF - 32) * (5 / 9);
            const a = 17.27, b = 237.7;
            const alpha = ((a * tempC) / (b + tempC)) + Math.log(humidityPct / 100.0);
            const dpC = (b * alpha) / (a - alpha);
            return dpC * 9 / 5 + 32;
        }

        async function fetchWeather() {
            try {
                const response = await fetch(`https://api.tomorrow.io/v4/weather/forecast?location=${LAT},${LON}&apikey=${API_KEY}&units=imperial`);
                const data = await response.json();

                const hourlyData = data.timelines.hourly.slice(0, 24);
                const dailyData = data.timelines.daily.slice(0, 6);

                let html = `<div class="section-title">Next 24 Hours</div><div class="hourly-container">`;

                hourlyData.forEach(h => {
                    let dp = h.values.dewPoint ?? calculateDewPoint(h.values.temperature, h.values.humidity);
                    let comfort = getComfort(dp);
                    let timeLabel = new Date(h.time).toLocaleTimeString([], { hour: 'numeric' }).replace(" ", "").toLowerCase();

                    html += `
                        <div class="hourly-card" style="background-color: ${comfort.color}">
                            <div class="time">${timeLabel}</div>
                            <div class="emoji">${comfort.emoji}</div>
                            <div class="dp">${Math.round(dp)}°F</div>
                        </div>`;
                });
                html += `</div>`;

                html += `<div class="section-title">6-Day Forecast</div><div class="daily-container">`;
                dailyData.forEach(d => {
                    let dp = d.values.dewPointAvg ?? d.values.dewPoint ?? calculateDewPoint(d.values.temperatureAvg, d.values.humidityAvg);
                    let comfort = getComfort(dp);
                    let dayLabel = DOW2[new Date(d.time).getDay()];

                    html += `
                        <div class="daily-row" style="background-color: ${comfort.color}">
                            <div class="day">${dayLabel}</div>
                            <div class="comfort-status"><span>${comfort.emoji}</span>${comfort.label} (${comfort.level})</div>
                            <div class="dp">${Math.round(dp)}°F</div>
                        </div>`;
                });
                html += `</div>`;

                document.getElementById('app-content').innerHTML = html;
            } catch (err) {
                document.getElementById('app-content').innerHTML = `<div class="loading" style="color:#CF6679;">Failed to fetch weather data. Check your API key.</div>`;
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        fetchWeather();
    </script>
</body>
</html>
